# NikoTV - Cloudflare Worker 部署配置
# 部署命令：wrangler deploy
name = "niketv"
main = "worker.js"
compatibility_date = "2026-07-01"

# 注意：前端 SPA 部署在 Cloudflare Pages（dist/ 目录）
# Worker 只负责带 ?url= 的代理请求和 /health 健康检查
# 不使用 assets 绑定，避免 ASSETS 拦截 / 路径请求导致代理无法工作

# 免费套餐：10万请求/天，个人使用绰绰有余
# 如需自定义域名，取消下面注释并配置 DNS
# routes = [
#   { pattern = "proxy.yourdomain.com", zone_name = "yourdomain.com" }
# ]

# 环境变量
[vars]
ENVIRONMENT = "production"
